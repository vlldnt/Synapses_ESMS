services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapses-backend
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data
    networks:
      - synapses

  frontend:
    build:
      context: ./frontend
      dockerfile: DOCKERFILE
    container_name: synapses-frontend
    ports:
      - "8083:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - synapses

networks:
  synapses:
    driver: bridge
