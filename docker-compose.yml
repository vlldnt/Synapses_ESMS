services:
  frontend:
    build:
      context: ./frontend
      dockerfile: DOCKERFILE
    container_name: synapses-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped
