services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synapses-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend/data:/app/data
      - ./backend/data/google-key.json:/app/data/google-key.json:ro
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
    networks:
      - synapses

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_OPENROUTER_API_KEY=${VITE_OPENROUTER_API_KEY}
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: synapses-frontend
    ports:
      - "${FRONTEND_PORT:-8083}:80"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - synapses

networks:
  synapses:
    driver: bridge
