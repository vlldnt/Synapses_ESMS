<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapses Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; height: 100vh; }
  #app { width: 100%; max-width: 700px; display: flex; flex-direction: column; height: 100vh; padding: 20px; }
  h1 { text-align: center; margin-bottom: 16px; color: #e94560; }
  #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px 0; }
  .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }
  .user { background: #0f3460; align-self: flex-end; }
  .assistant { background: #16213e; align-self: flex-start; border: 1px solid #333; }
  #input-row { display: flex; gap: 8px; padding-top: 12px; }
  #input-row textarea { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #16213e; color: #eee; font-size: 15px; resize: none; height: 48px; }
  #input-row button { padding: 0 20px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 15px; cursor: pointer; }
  #input-row button:disabled { opacity: 0.5; }
  .typing { color: #888; font-style: italic; align-self: flex-start; }
</style>
</head>
<body>
<div id="app">
  <h1>Synapses Chat</h1>
  <div id="messages"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Écris ton message..." rows="1"></textarea>
    <button id="send" onclick="send()">Envoyer</button>
  </div>
</div>
<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const btn = document.getElementById('send');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  btn.disabled = true;
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = '...';
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Erreur API');
    typing.remove();
    addMsg('assistant', data.response);
  } catch (e) {
    typing.remove();
    addMsg('assistant', 'Erreur: ' + e.message);
  }
  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
