map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── SPA React sous /synapses/ ────────────────────────────────────────
    location /synapses/ {
        try_files $uri $uri/ /index.html;
    }

    # ─── WebSocket streaming transcription ────────────────────────────────
    location /api/transcribe-ws {
        proxy_pass http://backend:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 310s;  # > 5min Google stream limit
        proxy_send_timeout 310s;
    }

    # ─── WebSocket sous /synapses/api/ ────────────────────────────────────
    location /synapses/api/transcribe-ws {
        rewrite ^/synapses/(.*)$ /$1 break;
        proxy_pass http://backend:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 310s;
        proxy_send_timeout 310s;
    }

    # ─── API via préfixe /synapses/api/ ───────────────────────────────────
    location /synapses/api/ {
        rewrite ^/synapses/(.*)$ /$1 break;
        proxy_pass http://backend:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ─── API backend (inclut /api/transcribe-chunk et toutes les routes) ──
    location /api/ {
        proxy_pass http://backend:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ─── Fallback SPA ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
