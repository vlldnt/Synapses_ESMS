server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── /synapses/ routing (React SPA) ───────────────────────────────────
    location /synapses/ {
        try_files $uri $uri/ /index.html;
    }

    # ─── /synapses/api routing (Backend API) ──────────────────────────────
    location /synapses/api/ {
        rewrite ^/synapses/(.*)$ /$1 break;
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ─── /synapses/transcribe-stream (Streaming) ──────────────────────────
    location /synapses/transcribe-stream {
        rewrite ^/synapses/(.*)$ /$1 break;
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type application/octet-stream;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── /synapses/transcribe (Non-streaming) ────────────────────────────
    location /synapses/transcribe {
        rewrite ^/synapses/(.*)$ /$1 break;
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ─── Root / routing (backward compatibility) ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── /api routing (backward compatibility) ────────────────────────────
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ─── /transcribe-stream (backward compatibility) ──────────────────────
    location /transcribe-stream {
        proxy_pass http://backend:3001/transcribe-stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type application/octet-stream;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /transcribe {
        proxy_pass http://backend:3001/transcribe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
