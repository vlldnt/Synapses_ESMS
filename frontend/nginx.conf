server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── SPA React sous /synapses/ ────────────────────────────────────────
    location /synapses/ {
        try_files $uri $uri/ /index.html;
    }

    # ─── API via préfixe /synapses/api/ ───────────────────────────────────
    location /synapses/api/ {
        rewrite ^/synapses/(.*)$ /$1 break;
        proxy_pass http://backend:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ─── API backend (inclut /api/transcribe-chunk et toutes les routes) ──
    location /api/ {
        proxy_pass http://backend:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ─── Fallback SPA ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
